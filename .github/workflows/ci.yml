name: Pruebas automáticas

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  pruebas:
    name: Validar datos y notebook
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependencias de pruebas
        run: python -m pip install pytest

      - name: Ejecutar pruebas automáticas
        run: pytest -q

  docker:
    name: Construir y probar Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v5

      - name: Construir imagen Docker
        run: docker build -t operaciones-aereas-chile .

      - name: Ejecutar pruebas dentro del contenedor
        run: docker run --rm operaciones-aereas-chile

  publicar:
    name: Publicar imagen Docker en GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pruebas, docker]

    # Publica únicamente después de un push exitoso a main.
    # No publica imágenes desde pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v5

      - name: Iniciar sesión en GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Construir imagen para publicación
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}:latest \
            .

      - name: Publicar imagen en GHCR
        run: |
          docker push \
            ghcr.io/${{ github.repository }}:latest
