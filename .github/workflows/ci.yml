name: Pruebas automáticas

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pruebas:
    name: Validar datos y notebook
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependencias de pruebas
        run: python -m pip install pytest

      - name: Ejecutar pruebas automáticas
        run: pytest -q

  docker:
    name: Construir y probar Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v5

      - name: Construir imagen Docker
        run: docker build -t operaciones-aereas-chile .

      - name: Ejecutar pruebas dentro del contenedor
        run: docker run --rm operaciones-aereas-chile
